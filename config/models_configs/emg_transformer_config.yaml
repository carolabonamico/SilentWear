# config/models_configs/emg_transformer_config.yaml

model:
  kind: dl
  name: emg_transformer
  kwargs:
    train_cfg:
      num_epochs: 200
      lr: 5e-4
      early_stop_patience: 20
      weight_decay: 0
      grad_clip_norm: 1.0

      # Use CTC loss and provide vocab + ctc settings
      loss_name: ctc

      vocab_words:
        - up
        - down
        - left
        - right
        - forward
        - backward
        - start
        - stop

      ctc:
        blank_id: 0
        lexicon_path: lexicon/silentwear_lexicon.txt
        allow_nearest_word_match: true

      optimizer_cfg:
        name: adamw
        lr: 5e-4

      scheduler:
        name: ReduceLROnPlateau
        mode: min
        factor: 0.1
        patience: 5
        verbose: true
