# config/models_configs/emg_transformer_config.yaml

model:
  kind: dl
  name: emg_transformer
  kwargs:
    attn_drop: 0.1
    proj_drop: 0.1

    train_cfg:
      warmup_epochs: 5
      num_epochs: 200
      lr: 0.0003
      early_stop_patience: 20
      weight_decay: 1.0e-4
      grad_clip_norm: 1.0

      # Use CTC loss and read words from ctc.lexicon_path
      loss_name: ctc

      ctc:
        blank_id: 0
        lexicon_path: lexicon/silentwear_lexicon.txt
        allow_nearest_word_match: true

      optimizer_cfg:
        name: adamw
        lr: 0.0003

      scheduler:
        name: ReduceLROnPlateau
        mode: min
        factor: 0.5
        patience: 5
        verbose: true
